<!DOCTYPE html>
<html lang="es">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Ejercicio Clase 3</title>
   </head>
   <body>
      <!-- Contenido del cuerpo del documento HTML -->
      <header>
         <!-- Cabecera del documento -->
          <h1>Bienvenido a mi web</h1>
          <img height="300" src="../image1.jpg" alt="Imagen de bienvenida">
      </header>
      <nav>
         <!-- Barra de navegación -->
          <h2>Menú de navegación</h2>
          <img height="200" src="./image2.jpg" alt="Imagen de navegación">
      </nav>
      <section>
         <!-- Sección de contenido principal -->
          <h3>Contenido principal</h3>
          <img height="180" src="./Assets/image3.jpg" alt="Imagen del contenido principal">
      </section>
      <article>
         <!-- Artículo o contenido independiente -->
          <h3>Artículo Independiente</h3>
          <img height="230" src="./Assets/extras/image4.jpg" alt="Imagen del artículo">
      </article>
      <aside>
         <!-- Contenido relacionado o complementario al contenido principal -->
          <p>Este es un contenido complementario al contenido principal.</p>
      </aside>
      <footer>
         <!-- Pie de página -->
          <br><br>
            <p>Tomás Fernández - Ejercicio Clase 3</p>
      </footer>
   </body>
</html>
